<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kawaii TodoList</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Carter+One&family=Fredoka:wght@600&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="app-container">

    <div class="todo-card">

        <!-- Background Watermark -->
        <img src="assets/background-bunny.jpg"
             alt=""
             class="watermark-bunny">

        <!-- Heading -->
        <h1>Kawaii TodoList</h1>

        <!-- Input -->
        <div class="input-section">

            <input
                type="text"
                placeholder="Add your task">

            <button class="add-btn">

                <img src="assets/add.png"
                     alt="Add">

            </button>

        </div>

        <!-- Message -->
        <p class="status-msg">
            Tasks added successfully.
        </p>

        <!-- Todo List -->
        <div class="list-container">

            <div class="todo-item">

                <span class="task-name">
                    Go to market.
                </span>

                <div class="task-icons">

                    <img src="assets/edit.png"
                         alt="Edit">

                    <img src="assets/delete.png"
                         alt="Delete">

                </div>

            </div>

            <div class="todo-item">

                <span class="task-name">
                    to practice code
                </span>

                <div class="task-icons">

                    <img src="assets/edit.png"
                         alt="Edit">

                    <img src="assets/delete.png"
                         alt="Delete">

                </div>

            </div>

            <div class="todo-item">

                <span class="task-name">
                    to learn new hadith
                </span>

                <div class="task-icons">

                    <img src="assets/edit.png"
                         alt="Edit">

                    <img src="assets/delete.png"
                         alt="Delete">

                </div>

            </div>

            <div class="todo-item">

                <span class="task-name">
                    to learn arabic
                </span>

                <div class="task-icons">

                    <img src="assets/edit.png"
                         alt="Edit">

                    <img src="assets/delete.png"
                         alt="Delete">

                </div>

            </div>

        </div>

        <!-- Bottom Bunny -->
        <div class="bottom-mascot">

            <img src="assets/bunny.png"
                 alt="Cute Bunny">

        </div>

    </div>

</div>

</body>
</html>
